name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch
  push:
    branches: [master]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Pushing to the gh-pages branch needs write access to repo contents
permissions:
  contents: write

# Share one concurrency group with the preview workflow so deploys never
# push to the gh-pages branch at the same time (avoids git push races).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: /keychain-maker/

      - name: Publish to gh-pages (site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Keep existing files (e.g. the preview/ folder) when updating prod.
          keep_files: true
