name: Deploy Branch Preview

on:
  # Manual only: pick the branch to preview in the Actions tab "Run workflow"
  # dropdown. github.ref_name resolves to whatever branch you select.
  workflow_dispatch:

# Pushing to the gh-pages branch needs write access to repo contents
permissions:
  contents: write

# Share the production workflow's concurrency group so the two never push to
# the gh-pages branch simultaneously.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Compute preview slug
        id: slug
        # Sanitize the branch name into a single path segment (e.g.
        # feature/foo -> feature-foo) so it maps to one preview folder.
        run: echo "slug=$(echo '${{ github.ref_name }}' | sed 's#[^a-zA-Z0-9._-]#-#g')" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: /keychain-maker/preview/${{ steps.slug.outputs.slug }}/

      - name: Publish to gh-pages (preview subfolder)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: preview/${{ steps.slug.outputs.slug }}
          # Don't wipe production or other previews.
          keep_files: true

      - name: Preview URL
        run: |
          echo "### Preview deployed 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "https://andzhik.github.io/keychain-maker/preview/${{ steps.slug.outputs.slug }}/" >> "$GITHUB_STEP_SUMMARY"
